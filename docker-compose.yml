services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "3000:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bvpn
      POSTGRES_PASSWORD: bvpn_password
      POSTGRES_DB: bvpn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bvpn"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://bvpn:bvpn_password@postgres:5432/bvpn?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://183.255.189.48:3000
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: http://183.255.189.48:3000
      API_URL: http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    env_file:
      - .env
    cap_add:
      - NET_ADMIN
    volumes:
      - agent_data:/app/apps/agent/data
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  agent_data:
  caddy_data:
  caddy_config:
