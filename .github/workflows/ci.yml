name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bvpn
          POSTGRES_PASSWORD: bvpn_password
          POSTGRES_DB: bvpn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U bvpn
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: DATABASE_URL="postgresql://bvpn:bvpn_password@localhost:5432/bvpn" npm run prisma:generate
      - run: npm run typecheck

  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bvpn
          POSTGRES_PASSWORD: bvpn_password
          POSTGRES_DB: bvpn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U bvpn
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: DATABASE_URL="postgresql://bvpn:bvpn_password@localhost:5432/bvpn" npm run prisma:generate
      - run: npm run build

