server {
  listen 80;
  server_name bvpn.com www.bvpn.com api.bvpn.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name bvpn.com www.bvpn.com;

  # ssl_certificate /etc/letsencrypt/live/bvpn.com/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/bvpn.com/privkey.pem;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
  gzip_min_length 1000;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
  }
}

server {
  listen 443 ssl http2;
  server_name api.bvpn.com;

  # ssl_certificate /etc/letsencrypt/live/api.bvpn.com/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/api.bvpn.com/privkey.pem;

  client_max_body_size 5m;

  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
